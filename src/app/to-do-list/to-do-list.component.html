<div class="todo-container">

  <!-- Header -->
  <div class="header">
    <h2>🔥 My Tasks</h2>
    <p>All your tasks synced in real-time</p>
  </div>

  <!-- Add Task Form -->
  <form (ngSubmit)="addTask()" class="task-form">

    <input
      [(ngModel)]="newTask.title"
      name="title"
      placeholder="Task title..."
      required
    />

    <input
      [(ngModel)]="newTask.desc"
      name="desc"
      placeholder="Task description..."
    />

    <button type="submit" (click)="addTask()">➕ Add</button>
  </form>

  <!-- Tasks List -->
  <ul class="task-list">

    <li *ngFor="let task of tasks" class="task-item">

      <div class="task-info">
        <h4>{{ task.title }}</h4>
        <p>{{ task.desc }}</p>
        <small>👤 {{ task.ownerEmail }}</small>
      </div>

      <button class="delete-btn" (click)="deleteTask(task.id)">
        ❌
      </button>

    </li>

  </ul>

</div>
