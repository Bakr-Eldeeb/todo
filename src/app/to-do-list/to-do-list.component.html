<div class="todo-page">
  <div class="todo-card">
    <div class="top-bar">
      <div>
        <h1>My Tasks</h1>
        <p>{{ user?.email }}</p>
      </div>

      <button class="logout" (click)="logout()">Logout</button>
    </div>

    <div class="add-box">
      <input
        type="text"
        placeholder="Add new task..."
        [(ngModel)]="newTask"
        (keyup.enter)="addTask()"
      >

      <button (click)="addTask()">Add Task</button>
    </div>

    <div class="tasks" *ngIf="tasks.length > 0; else noTasks">
      <div class="task" *ngFor="let task of tasks">
        <span>{{ task.title }}</span>

        <div class="actions">
          <button class="share" (click)="shareTask(task)">Share</button>
          <button class="delete" (click)="deleteTask(task.id)">Delete</button>
        </div>
      </div>
    </div>

    <ng-template #noTasks>
      <p class="empty">No tasks yet. Add your first task.</p>
    </ng-template>
  </div>
</div>
