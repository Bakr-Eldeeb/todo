<div class="login-wrapper">
  <div class="login-card">

    <h1>Welcome Back</h1>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-group">

      <input type="email" formControlName="email" placeholder="Email" class="inputs">

      <input type="password" formControlName="password" placeholder="Password"  class="inputs">

      <button type="submit" [disabled]="loginForm.invalid" (click)="goToTodo()">
        Sign In
      </button>

    </form>

    <a routerLink="/sign-up" class="create-account-link">Create Account</a>

  </div>
</div>
