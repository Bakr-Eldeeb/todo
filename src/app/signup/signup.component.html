<div class="auth-page">
  <div class="auth-card">
    <h1>Sign Up</h1>
    <p>Create your account to save your tasks.</p>

    <input type="email" placeholder="Email" [(ngModel)]="email">
    <input type="password" placeholder="Password" [(ngModel)]="password">
    <input type="password" placeholder="Confirm Password" [(ngModel)]="confirmPassword">

    <button (click)="signup()">Create Account</button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <p class="link">
      Already have an account?
      <a routerLink="/">Login</a>
    </p>
  </div>
</div>
